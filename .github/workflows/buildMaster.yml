name: Master Build
# builds windows, linux and Mac

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches'
        required: true
        type: choice
        options:
          - all of main
          - all of qa
          - all of dev
        default: all of main

      os:
        description: 'OS'
        required: true
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
        default: all

      log_level:
        description: 'Log level'
        required: true
        type: choice
        options:
          - critical
          - normal
          - debug
          - 'off'
        default: critical

# set run name from input so the run appears with that name (no API call needed)
run-name: >-
  Master Build
  - ${{ inputs.branches }}
  - ${{ inputs.os == 'all' && 'all OSes' || inputs.os }}
  - log=${{ inputs.log_level }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Branches is ${{ inputs.branches }}"
          echo "OS is ${{ inputs.os }}"
          echo "Log level is ${{ inputs.log_level }}"

  build-macos-x64:
    name: Build on macOS x64 (Intel64)
    if: ${{ inputs.os == 'all' || inputs.os == 'macos' }}
    uses: ./.github/workflows/macos-build-steps.yml
    with:
      runner: macos-15-intel
      delay_seconds: 1
      log_level: ${{ inputs.log_level }}
      branches: ${{ inputs.branches == 'all of main' && 'main' || inputs.branches == 'all of qa' && 'qa' || 'dev' }}

  build-macos-arm64:
    name: Build on macOS ARM64 (Apple Silicon)
    if: ${{ inputs.os == 'all' || inputs.os == 'macos' }}
    uses: ./.github/workflows/macos-build-steps.yml
    with:
      runner: macos-14
      delay_seconds: 600
      log_level: ${{ inputs.log_level }}
      branches: ${{ inputs.branches == 'all of main' && 'main' || inputs.branches == 'all of qa' && 'qa' || 'dev' }}

  build-windows-x64:
    name: Build on Windows x64
    if: ${{ inputs.os == 'all' || inputs.os == 'windows' }}
    uses: ./.github/workflows/windows-build-steps.yml
    with:
      runner: windows-2025
      log_level: ${{ inputs.log_level }}
      branches: ${{ inputs.branches == 'all of main' && 'main' || inputs.branches == 'all of qa' && 'qa' || 'dev' }}

  build-windows-arm64:
    name: Build on Windows arm64
    if: ${{ inputs.os == 'all' || inputs.os == 'windows' }}
    uses: ./.github/workflows/windows-build-steps.yml
    with:
      runner: windows-11-arm
      log_level: ${{ inputs.log_level }}
      branches: ${{ inputs.branches == 'all of main' && 'main' || inputs.branches == 'all of qa' && 'qa' || 'dev' }}

  build-linux-x64:
    name: Build on Linux x64
    if: ${{ inputs.os == 'all' || inputs.os == 'linux' }}
    uses: ./.github/workflows/linux-build-steps.yml
    with:
      runner: ubuntu-22.04
      log_level: ${{ inputs.log_level }}
      branches: ${{ inputs.branches == 'all of main' && 'main' || inputs.branches == 'all of qa' && 'qa' || 'dev' }}

  build-linux-arm64:
    name: Build on Linux arm64
    if: ${{ inputs.os == 'all' || inputs.os == 'linux' }}
    uses: ./.github/workflows/linux-build-steps.yml
    with:
      runner: ubuntu-22.04-arm
      log_level: ${{ inputs.log_level }}
      branches: ${{ inputs.branches == 'all of main' && 'main' || inputs.branches == 'all of qa' && 'qa' || 'dev' }}

  finalize:
    needs: [build-macos-x64, build-macos-arm64, build-windows-x64, build-windows-arm64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: always()
    steps:
      # Turn off re-runs
      - name: No re-runs please
        run: |
         if [ "$GITHUB_RUN_ATTEMPT" -gt 1 ]; then
            echo "No re-runs. They use the commit SHA and git ref of the original event that triggered the workflow run. However, that does not extend to client and resource repos which may expect a more recent panksomia-web."
            echo "Start a new workflow run instead."
            exit 1
          else
            echo "NOT a re-run"
          fi

      # Check build status (allow skipped when OS not selected)
      - name: Check build status
        run: |
          check () {
            job="$1"
            result="$2"

            case "$result" in
              success) echo "$job: success" ;;
              skipped) echo "$job: skipped" ;;
              failure|cancelled|timed_out) echo "$job: failed ($result)"; exit 1 ;;
              *) echo "$job: failed (unknown result: $result)"; exit 1 ;;
            esac
          }

          check "macos-x64"  "${{ needs.build-macos-x64.result }}"
          check "macos-arm64"    "${{ needs.build-macos-arm64.result }}"
          check "windows-x64"      "${{ needs.build-windows-x64.result }}"
          check "windows-arm64"      "${{ needs.build-windows-arm64.result }}"
          check "linux-x64"        "${{ needs.build-linux-x64.result }}"
          check "linux-arm64"        "${{ needs.build-linux-arm64.result }}"

          echo "Selected builds completed successfully"

